<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE THIRD STATE — Knyck Zhou</title>
<style>
@font-face{font-family:'Cascadia Mono';src:url('https://cdn.jsdelivr.net/gh/AfonsoSalgadoSousa/cascadia-code-web@main/fonts/CascadiaMono.woff2') format('woff2');font-weight:200 700;font-style:normal;font-display:swap}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08090b;color:#9aa3ad;font-family:'Cascadia Mono','Cascadia Code',Consolas,'Courier New',monospace}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0;transition:none}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
#ui *{pointer-events:auto}

/* BOTTOM BAR */
.bottom-bar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;padding:24px 40px;pointer-events:none}
.bottom-left{flex:1;position:relative}
.bottom-center{flex:1;text-align:center}
.bottom-right{flex:1;display:flex;justify-content:flex-end}

.title-main{font-weight:300;font-size:clamp(16px,2vw,26px);letter-spacing:.35em;color:#d0d4d8;text-transform:uppercase;margin-bottom:6px}
.title-author{font-size:10px;letter-spacing:.18em;color:#3a3f45;text-transform:uppercase}
.title-coords{font-size:10px;letter-spacing:.12em;color:#2a2f35;margin-top:2px}

.hint-text{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5a6068;line-height:1;pointer-events:none;transition:opacity .6s;padding:0;margin:0;position:absolute;bottom:0;left:0;white-space:nowrap}
.hint-text span{color:#9aa3ad}
.bottom-bar.compact .hint-text{display:none}
.bottom-bar.compact .sub-menu{display:none}

/* Controls row: each button has its own sub-menu wrapper */
.controls-row{display:flex;gap:24px;pointer-events:auto;align-items:baseline}
.view-wrap{position:relative}
.view-btn{background:transparent;border:none;color:#3a3f45;font-family:inherit;font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:0;cursor:pointer;transition:color .5s;position:relative;pointer-events:auto}
.view-btn:hover{color:#7a8088}
.view-btn.active{color:#9aa3ad}
.view-btn.active::after{content:'';position:absolute;bottom:-5px;left:0;width:100%;height:1px;background:#5a6068}

/* Sub-menus expand upward from their respective button wrapper */
.sub-menu{position:absolute;bottom:100%;right:0;display:flex;flex-direction:column;gap:10px;padding-bottom:18px;opacity:0;pointer-events:none;transition:opacity .5s;align-items:flex-end}
.sub-menu.visible{opacity:1;pointer-events:auto}

.prog-btn{background:transparent;border:none;color:#2a2f35;font-family:inherit;font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:0;cursor:pointer;transition:color .4s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.prog-btn:hover{color:#6a7078}
.prog-btn.active{color:#9aa3ad}
.prog-btn .dot{display:inline-block;width:4px;height:4px;border-radius:50%;opacity:.3;transition:opacity .4s}
.prog-btn.active .dot{opacity:.8}

.layer-btn{background:transparent;border:none;color:#2a2f35;font-family:inherit;font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:0;cursor:pointer;transition:color .4s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.layer-btn:hover{color:#6a7078}
.layer-btn.active{color:#5a6068}
.layer-btn .dot{display:inline-block;width:4px;height:4px;border-radius:50%;opacity:.3;transition:opacity .4s}
.layer-btn.active .dot{opacity:.8}

/* Detail info — left column only, transparent, scrollable */
#detail-left{position:absolute;top:0;left:0;width:28%;min-width:280px;max-width:360px;height:calc(100% - 90px);padding:56px 36px 40px 40px;display:flex;flex-direction:column;justify-content:center;pointer-events:none;opacity:0;transition:opacity .7s cubic-bezier(.22,.1,.25,1);z-index:3;overflow-y:auto}
#detail-left.open{opacity:1;pointer-events:auto}
#detail-left::-webkit-scrollbar{width:1px}
#detail-left::-webkit-scrollbar-thumb{background:#1a1d22}

.panel-close{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#4a5058;cursor:pointer;margin-bottom:44px;transition:color .3s;background:none;border:none;font-family:inherit;pointer-events:auto;text-align:left}
.panel-close:hover{color:#9aa3ad}
.panel-zone-num{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#3a3f45;margin-bottom:16px}
.panel-zone-name{font-weight:300;font-size:clamp(18px,2.2vw,26px);color:#d0d4d8;letter-spacing:.06em;margin-bottom:8px;line-height:1.3;text-transform:uppercase}
.panel-zone-sub{font-size:11px;letter-spacing:.25em;text-transform:uppercase;margin-bottom:28px}
.panel-desc{font-size:11px;line-height:1.9;color:#6a7078;margin-bottom:28px;font-weight:300}
.panel-section-title{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#3a3f45;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.mechanic-item{margin-bottom:22px}
.mechanic-title{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#9aa3ad;margin-bottom:5px}
.mechanic-desc{font-size:11px;line-height:1.85;color:#4a5058;font-weight:300}

#hover-label{position:fixed;pointer-events:none;font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:0;transition:opacity .3s;z-index:2;white-space:nowrap;line-height:1.7}
#hover-label .hl-num{font-size:9px;letter-spacing:.22em;opacity:.55}
#hover-label .hl-name{font-size:10px;letter-spacing:.1em}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bg-overlay"></div>
<div id="ui">
  <div id="detail-left">
    <button class="panel-close" onclick="closePanel()">&larr; CLOSE</button>
    <div class="panel-zone-num" id="pz-num"></div>
    <div class="panel-zone-name" id="pz-name"></div>
    <div class="panel-zone-sub" id="pz-sub"></div>
    <div class="panel-desc" id="pz-desc"></div>
    <div class="panel-section-title">SPATIAL MECHANICS</div>
    <div id="pz-mechanics"></div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="hint-text" id="hint-plan"><span>HOVER</span> TO REVEAL &middot; <span>CLICK</span> TO EXPLORE &middot; <span>SCROLL</span> TO ZOOM &middot; <span>DRAG</span> TO PAN</div>
      <div class="hint-text" id="hint-axo" style="opacity:0"><span>DRAG</span> TO ORBIT &middot; <span>SCROLL</span> TO ZOOM &middot; <span>SELECT</span> LAYERS TO FILTER</div>
    </div>
    <div class="bottom-center">
      <div class="title-main">THE THIRD STATE</div>
      <div class="title-author">KNYCK ZHOU &ensp;|&ensp; SCI-ARC &ensp;|&ensp; 2GBX</div>
      <div class="title-coords">40&deg;45'10.2"N 74&deg;00'23.8"W &middot; 620 W 30TH ST, HUDSON YARDS, NEW YORK</div>
    </div>
    <div class="bottom-right">
      <div class="controls-row">
        <div class="view-wrap">
          <div class="sub-menu visible" id="prog-toggles">
            <button class="prog-btn" data-zi="0" onclick="selectProg(0)"><span class="dot" style="background:#e0d0b8"></span>01 URBAN SUPERCOMPUTING CORE</button>
            <button class="prog-btn" data-zi="2" onclick="selectProg(2)"><span class="dot" style="background:#c49a6a"></span>02 PUBLIC DATA PROMENADE</button>
            <button class="prog-btn" data-zi="7" onclick="selectProg(7)"><span class="dot" style="background:#a0a870"></span>03 DATA GALLERIES</button>
            <button class="prog-btn" data-zi="4" onclick="selectProg(4)"><span class="dot" style="background:#c08090"></span>04 ALGORITHMIC PERFORMANCE SPACE</button>
            <button class="prog-btn" data-zi="3" onclick="selectProg(3)"><span class="dot" style="background:#b8a078"></span>05 RESEARCH STUDIOS</button>
            <button class="prog-btn" data-zi="1" onclick="selectProg(1)"><span class="dot" style="background:#7ab0b8"></span>06 DATA THEATRE</button>
            <button class="prog-btn" data-zi="6" onclick="selectProg(6)"><span class="dot" style="background:#70b090"></span>07 CITY FORUM</button>
            <button class="prog-btn" data-zi="5" onclick="selectProg(5)"><span class="dot" style="background:#80b8a0"></span>08 E-SCAPE</button>
            <button class="prog-btn" data-zi="8" onclick="selectProg(8)"><span class="dot" style="background:#8888a0"></span>09 INFRASTRUCTURE STRATUM</button>
            <button class="prog-btn" data-zi="9" onclick="selectProg(9)"><span class="dot" style="background:#a09088"></span>10 ADMINISTRATION</button>
          </div>
          <button class="view-btn active" id="btn-plan" onclick="switchView('plan')">PLAN</button>
        </div>
        <div class="view-wrap">
          <div class="sub-menu" id="layer-toggles">
            <button class="layer-btn active" onclick="toggleLayer(this,0)"><span class="dot" style="background:#888"></span>SKIN</button>
            <button class="layer-btn active" onclick="toggleLayer(this,1)"><span class="dot" style="background:#c49a6a"></span>ARTERY</button>
            <button class="layer-btn active" onclick="toggleLayer(this,2)"><span class="dot" style="background:#a0a870"></span>SYNAPSE</button>
            <button class="layer-btn active" onclick="toggleLayer(this,3)"><span class="dot" style="background:#80b8a0"></span>LUNG</button>
            <button class="layer-btn active" onclick="toggleLayer(this,4)"><span class="dot" style="background:#e0d0b8"></span>BRAIN</button>
            <button class="layer-btn active" onclick="toggleLayer(this,5)"><span class="dot" style="background:#a09088"></span>SKELETON</button>
          </div>
          <button class="view-btn" id="btn-axo" onclick="switchView('axo')">AXONOMETRIC</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="hover-label"></div>

// Display order: data indices in presentation sequence
const DISP_ORDER=[0,2,7,4,3,1,6,5,8,9];
const ZONE_COUNT=10;

let currentView='plan',panelOpen=false,selectedZone=-1,time=0;
let axoRotX=0.55,axoRotY=0.7,axoZoom=1.0;
let planZoom=1.0,planPanX=0,planPanY=0;
let viewT=0; // 0=plan, 1=axo — smooth transition parameter
let viewTarget=0;
let isDrag=false,dSX,dSY,dSRX,dSRY;
const layerVis=[true,true,true,true,true,true];
let hoveredZone=-1;
let shellHover=false;
const zoneAct=new Float32Array(ZONE_COUNT);
let shellAct=0;
let axoHoverActive=false; // set in tick(), read next frame for trail fade
let hlFade=0;
let mouseX=-9999,mouseY=-9999;
let mouseMX=0,mouseMZ=0;
let repelBoxL=0,repelBoxR=0,repelBoxT=0,repelBoxB=0;
let repelActive=false;
let bgOpacity=0,bgTarget=0,bgCurrentZone=-1;
// Panel transition state
let panelFadePhase=0; // 0=idle, 1=fading out old, 2=fading in new
let panelFadeTimer=0;
let panelNextZone=-1;

function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function planSc(){return Math.min(W,H)*.72*planZoom}

function pointInHull(px,pz){
  const n=HULL.length;
  if(n<3)return false;
  for(let i=0;i<n;i++){
    const a=HULL[i],b=HULL[(i+1)%n];
    if((b[0]-a[0])*(pz-a[1])-(b[1]-a[1])*(px-a[0])<0)return false;
  }
  return true;
}
const HULL_BB={
  l:Math.min(...HULL.map(h=>h[0]))-0.06,
  r:Math.max(...HULL.map(h=>h[0]))+0.06,
  t:Math.min(...HULL.map(h=>h[1]))-0.06,
  b:Math.max(...HULL.map(h=>h[1]))+0.06
};

const ZCOL={0:'#e0d0b8',1:'#7ab0b8',2:'#c49a6a',3:'#b8a078',4:'#c08090',5:'#80b8a0',6:'#70b090',7:'#a0a870',8:'#8888a0',9:'#a09088','-1':'#ffffff'};

const particles=[];
for(let i=0;i<P.length;i++){
  const d=P[i],zi=d[4],li=d[3];
  let col=ZCOL[zi]||'#ffffff';
  if(li===1)col=Math.random()>.5?'#c49a6a':'#d4a878';
  const rgb=hexRgb(col);
  const tw1F=0.12+Math.random()*0.5;
  const tw2F=0.35+Math.random()*1.0;
  const tw3F=0.8+Math.random()*2.0;
  const tw1P=Math.random()*Math.PI*2;
  const tw2P=Math.random()*Math.PI*2;
  const tw3P=Math.random()*Math.PI*2;
  const tw1A=0.25+Math.random()*0.3;
  const tw2A=0.12+Math.random()*0.18;
  const tw3A=0.06+Math.random()*0.1;
  const turbSeed=Math.random()*1000;
  particles.push({
    ox:d[0],oy:d[1],oz:d[2],px:d[0],pz:d[2],vx:0,vz:0,x:0,y:0,
    li:li,zi:zi,
    size:li===0?0.4+Math.random()*0.6:0.5+Math.random()*0.9,
    bOp:li===0?0.08+Math.random()*0.12:0.15+Math.random()*0.3,
    r:rgb.r,g:rgb.g,b:rgb.b,
    br:Math.min(255,rgb.r+60),bg_:Math.min(255,rgb.g+60),bb:Math.min(255,rgb.b+60),
    tw1F:tw1F,tw2F:tw2F,tw3F:tw3F,tw1P:tw1P,tw2P:tw2P,tw3P:tw3P,
    tw1A:tw1A,tw2A:tw2A,tw3A:tw3A,turbSeed:turbSeed,
    maxDrift:0.025+Math.random()*0.035
  });
}

function proj3d(x,y,z){
  const sc=Math.min(W,H)*.62*axoZoom;
  let tx=x*Math.cos(axoRotY)-z*Math.sin(axoRotY);
  let tz=x*Math.sin(axoRotY)+z*Math.cos(axoRotY);
  let ty=y*Math.cos(axoRotX)-tz*Math.sin(axoRotX);
  let tz2=y*Math.sin(axoRotX)+tz*Math.cos(axoRotX);
  return{x:cx+tx*sc,y:cy-ty*sc+tz2*sc*.25};
}

canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('mouseleave',function(){mouseX=-9999;mouseY=-9999;hoveredZone=-1;shellHover=false;repelActive=false;});

function updateHover(){
  if(viewT>0.1){hoveredZone=-1;shellHover=false;repelActive=false;return;}
  // When panel is open, allow clicking other zones (don't skip hover detection)
  const sc=planSc();
  mouseMX=(mouseX-cx-planPanX)/sc;
  mouseMZ=(mouseY-cy-planPanY)/sc;

  const insideMassing=pointInHull(mouseMX,mouseMZ);
  const nearMassing=mouseMX>HULL_BB.l&&mouseMX<HULL_BB.r&&mouseMZ>HULL_BB.t&&mouseMZ<HULL_BB.b;

  if(insideMassing){
    let closest=-1,closestDist=Infinity;
    for(let i=0;i<ZONE_COUNT;i++){
      const ctr=ZCTR[i];if(!ctr)continue;
      const d=Math.hypot(mouseMX-ctr.x,mouseMZ-ctr.z);
      const hitR=(ZRAD[i]||0.1)*1.1;
      if(d<hitR&&d<closestDist){closest=i;closestDist=d;}
    }
    hoveredZone=closest;
    shellHover=false;
    if(hoveredZone>=0&&!panelOpen){
      const z=ZONES[hoveredZone];
      hoverLabel.innerHTML='<span class="hl-num">ZONE '+String(z.id).padStart(2,'0')+'</span><br><span class="hl-name">'+z.name+'</span>';
      hoverLabel.style.left=(mouseX+16)+'px';
      hoverLabel.style.top=(mouseY-20)+'px';
      hoverLabel.style.color=z.color;
      hoverLabel.style.opacity='1';
      canvas.style.cursor='pointer';
      const labelRect=hoverLabel.getBoundingClientRect();
      const pad=3;
      const boxL=Math.min(mouseX-3,labelRect.left)-pad;
      const boxR=Math.max(mouseX+3,labelRect.right)+pad;
      const boxT=Math.min(mouseY-3,labelRect.top)-pad;
      const boxB=Math.max(mouseY+3,labelRect.bottom)+pad;
      repelBoxL=(boxL-cx-planPanX)/sc;repelBoxR=(boxR-cx-planPanX)/sc;
      repelBoxT=(boxT-cy-planPanY)/sc;repelBoxB=(boxB-cy-planPanY)/sc;
      repelActive=true;
      if(bgCurrentZone!==hoveredZone){bgCurrentZone=hoveredZone;bgOverlay.style.background=z.bg;}
      bgTarget=1;
    }else if(hoveredZone>=0&&panelOpen){
      // Panel open: still show label, repulsion, slight highlight
      const z=ZONES[hoveredZone];
      hoverLabel.innerHTML='<span class="hl-num">ZONE '+String(z.id).padStart(2,'0')+'</span><br><span class="hl-name">'+z.name+'</span>';
      hoverLabel.style.left=(mouseX+16)+'px';
      hoverLabel.style.top=(mouseY-20)+'px';
      hoverLabel.style.color=z.color;
      hoverLabel.style.opacity='1';
      canvas.style.cursor='pointer';
      const labelRect=hoverLabel.getBoundingClientRect();
      const pad=3;
      const boxL=Math.min(mouseX-3,labelRect.left)-pad;
      const boxR=Math.max(mouseX+3,labelRect.right)+pad;
      const boxT=Math.min(mouseY-3,labelRect.top)-pad;
      const boxB=Math.max(mouseY+3,labelRect.bottom)+pad;
      repelBoxL=(boxL-cx-planPanX)/sc;repelBoxR=(boxR-cx-planPanX)/sc;
      repelBoxT=(boxT-cy-planPanY)/sc;repelBoxB=(boxB-cy-planPanY)/sc;
      repelActive=true;
    }else{
      hoverLabel.style.opacity='0';
      canvas.style.cursor='default';
      repelActive=false;
      shellHover=true;
    }
  }else if(nearMassing){
    hoveredZone=-1;
    shellHover=true;
    hoverLabel.style.opacity='0';
    canvas.style.cursor='default';
    repelActive=false;
    if(!panelOpen)bgTarget=0;
  }else{
    hoveredZone=-1;
    shellHover=false;
    hoverLabel.style.opacity='0';
    canvas.style.cursor='default';
    repelActive=false;
    if(!panelOpen)bgTarget=0;
  }
}

function drawMassingOutline(){
  if(currentView!=='plan')return;
  const sc=planSc();
  oCtx.strokeStyle='rgba(255,255,255,.025)';
  oCtx.lineWidth=.5;
  oCtx.beginPath();
  for(let i=0;i<MASSING_OUTLINE.length;i++){
    const seg=MASSING_OUTLINE[i];
    oCtx.moveTo(cx+planPanX+seg[0][0]*sc,cy+planPanY+seg[0][1]*sc);
    oCtx.lineTo(cx+planPanX+seg[1][0]*sc,cy+planPanY+seg[1][1]*sc);
  }
  oCtx.stroke();
}

function drawNodes(){
  if(currentView!=='plan')return;
  const sc=planSc();
  for(let i=0;i<ZONE_COUNT;i++){
    const z=ZONES[i],ctr=ZCTR[i];if(!ctr)continue;
    const nx=cx+planPanX+ctr.x*sc,ny=cy+planPanY+ctr.z*sc;
    const act=zoneAct[i];
    if(act<0.3){
      oCtx.beginPath();oCtx.arc(nx,ny,2,0,Math.PI*2);
      oCtx.fillStyle=z.gc+'0.15)';oCtx.fill();
    }
  }
}


function noise2d(x,y){const n=Math.sin(x*12.9898+y*78.233)*43758.5453;return n-Math.floor(n);}
function repelFromBox(px,pz,bL,bR,bT,bB){
  const nearX=Math.max(bL,Math.min(px,bR));
  const nearZ=Math.max(bT,Math.min(pz,bB));
  let dx=px-nearX,dz=pz-nearZ;
  const dist=Math.sqrt(dx*dx+dz*dz)+0.0001;
  return{dx:dx/dist,dz:dz/dist,dist:dist};
}

function tick(){
  const sc=planSc();

  for(let i=0;i<ZONE_COUNT;i++){
    const target=(hoveredZone===i||selectedZone===i)?1:0;
    const spd=target>zoneAct[i]?0.035:0.025;
    zoneAct[i]+=(target-zoneAct[i])*spd;
    if(zoneAct[i]<0.001)zoneAct[i]=0;
  }
  const shellTarget=(shellHover&&!panelOpen)?1:0;
  shellAct+=(shellTarget-shellAct)*0.035;
  if(shellAct<0.001)shellAct=0;

  if(selectedZone>=0&&hlFade<1)hlFade=Math.min(1,hlFade+0.025);
  else if(selectedZone<0&&hlFade>0)hlFade=Math.max(0,hlFade-0.04);

  bgOpacity+=(bgTarget-bgOpacity)*0.03;
  if(bgOpacity<0.005)bgOpacity=0;
  bgOverlay.style.opacity=bgOpacity;

  const anyHover=hoveredZone>=0;
  let _axoHov=false;

  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    const act=p.zi>=0&&p.zi<ZONE_COUNT?zoneAct[p.zi]:0;
    const isHoveredZone=(hoveredZone===p.zi&&p.zi>=0);

    const twinkle=1.0
      -p.tw1A+p.tw1A*Math.sin(time*p.tw1F+p.tw1P)
      -p.tw2A+p.tw2A*Math.sin(time*p.tw2F+p.tw2P)
      -p.tw3A+p.tw3A*Math.sin(time*p.tw3F+p.tw3P);

    // Axo screen-space proximity hover effect
    let axoProx=0;
    if(viewT>0.1&&mouseX>0){
      const sdx=p.x-mouseX,sdy=p.y-mouseY;
      const sDist=Math.sqrt(sdx*sdx+sdy*sdy);
      const axoRadius=180;
      if(sDist<axoRadius){axoProx=(1-sDist/axoRadius)*viewT;_axoHov=true;}
    }

    if((act>0.01&&isHoveredZone)||axoProx>0.01){
      const ef=isHoveredZone?act:axoProx; // effect strength
      if(repelActive&&isHoveredZone){
        const rep=repelFromBox(p.px,p.pz,repelBoxL,repelBoxR,repelBoxT,repelBoxB);
        const repelRadius=0.015;
        if(rep.dist<repelRadius){
          const strength=0.00025*(1-rep.dist/repelRadius)*ef;
          p.vx+=rep.dx*strength;
          p.vz+=rep.dz*strength;
        }
      }
      if(axoProx>0.01){
        // Axo: repel in model coords based on screen direction
        const sdx=p.x-mouseX,sdy=p.y-mouseY;
        const sDist=Math.sqrt(sdx*sdx+sdy*sdy)+0.001;
        const repStr=0.0015*axoProx;
        p.vx+=sdx/sDist*repStr/sc;
        p.vz+=sdy/sDist*repStr/sc;
      }
      const turbScale=3.0;
      const nx=noise2d(p.ox*turbScale+time*0.15,p.oz*turbScale+p.turbSeed);
      const nz=noise2d(p.oz*turbScale+p.turbSeed,p.ox*turbScale-time*0.15);
      const turbForce=(axoProx>0.01?0.00054:0.00006)*ef;
      p.vx+=(nx-0.5)*turbForce;
      p.vz+=(nz-0.5)*turbForce;
      p.vx*=0.98;p.vz*=0.98;
      const maxV=axoProx>0.01?0.0045:0.0006;
      const vel=Math.sqrt(p.vx*p.vx+p.vz*p.vz);
      if(vel>maxV){p.vx*=maxV/vel;p.vz*=maxV/vel;}
    }else{
      p.vx*=0.93;p.vz*=0.93;
    }

    p.px+=p.vx;p.pz+=p.vz;
    const ddx=p.px-p.ox,ddz=p.pz-p.oz;
    const drift=Math.sqrt(ddx*ddx+ddz*ddz);
    const active=(isHoveredZone&&act>0.01)||axoProx>0.01;
    const ef2=isHoveredZone?act:axoProx;
    const leash=active?p.maxDrift*(1+ef2):0.0003;
    if(drift>leash){
      const excess=(drift-leash)/drift;
      const pull=active?0.02:0.1;
      p.px-=ddx*excess*pull;p.pz-=ddz*excess*pull;
    }
    if(!active||ef2<0.05){
      p.px+=(p.ox-p.px)*0.03;p.pz+=(p.oz-p.pz)*0.03;
    }

    // Unified projection — same pipeline as grid/massing (no screen lerp)
    const planX=cx+planPanX+p.px*sc,planY=cy+planPanY+p.pz*sc;
    const pr=proj3d(p.px,p.oy,p.pz);
    p.x=planX+(pr.x-planX)*viewT;
    p.y=planY+(pr.y-planY)*viewT;

    let op=p.bOp*Math.max(0.08,twinkle);

    if(p.zi<0&&shellAct>0.01&&!panelOpen){
      op=p.bOp*Math.max(0.08,twinkle)*(1+shellAct*2);
    }

    if(isHoveredZone&&act>0.01){
      op=p.bOp*Math.max(0.08,twinkle)*(1+act*3);
    }
    if(anyHover&&!isHoveredZone&&p.zi>=0&&!panelOpen){
      let maxAct=0;for(let j=0;j<ZONE_COUNT;j++)if(zoneAct[j]>maxAct)maxAct=zoneAct[j];
      op*=(1-maxAct*0.96);
    }
    if(anyHover&&p.zi<0&&!panelOpen){
      let maxAct=0;for(let j=0;j<ZONE_COUNT;j++)if(zoneAct[j]>maxAct)maxAct=zoneAct[j];
      op*=(1-maxAct*0.6);
    }
    if(selectedZone>=0&&p.zi===selectedZone)op=Math.min(1,op*(1.5+2*hlFade));
    if(panelOpen&&selectedZone>=0&&p.zi!==selectedZone&&p.zi>=0){
      if(hoveredZone===p.zi&&hoveredZone!==selectedZone)op*=0.35;
      else op*=0.08;
    }
    // Boost brightness in axo, interpolated by viewT
    op*=(1+viewT*2.5);
    if(viewT>0.5&&!layerVis[p.li])op*=0.01;

    const highlighted=selectedZone>=0&&p.zi===selectedZone&&hlFade>0.2;
    const hovered=isHoveredZone&&act>0.15;
    const sz=highlighted?p.size*(1+0.3*hlFade):hovered?p.size*(1+act*0.2):p.size;

    ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);
    if(highlighted||hovered){
      const m=highlighted?hlFade:act*0.6;
      ctx.fillStyle='rgba('+
        Math.round(p.r*(1-m)+p.br*m)+','+
        Math.round(p.g*(1-m)+p.bg_*m)+','+
        Math.round(p.b*(1-m)+p.bb*m)+','+Math.min(1,op)+')';
    }else{
      ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+Math.min(1,op)+')';
    }
    ctx.fill();
  }
  axoHoverActive=_axoHov;
}

// ── Noise grain layer ──
let grainCanvas=document.createElement('canvas');
let grainCtx=grainCanvas.getContext('2d');
function buildGrain(){
  const gw=Math.ceil(W/2),gh=Math.ceil(H/2);
  grainCanvas.width=gw;grainCanvas.height=gh;
  const imgData=grainCtx.createImageData(gw,gh);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*30;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=12.5;}
  grainCtx.putImageData(imgData,0,0);
}
buildGrain();
let grainTimer=0;

// ── Dot grid layer — full-screen coverage, interpolated between plan & axo ──
const GRID_STEP=25/443; // 25 ft in model coords
const GRID_Y=-0.127;
function drawDotGrid(){
  oCtx.strokeStyle='rgba(255,255,255,0.045)';
  oCtx.lineWidth=0.5;
  const sc=planSc();
  const maxSc=Math.max(sc,Math.min(W,H)*.62*axoZoom);
  const range=Math.max(2.0,(Math.max(W,H)/maxSc)*1.2+Math.abs(planPanX)/sc+Math.abs(planPanY)/sc);
  const arm=0.006;
  const panX=planPanX,panY=planPanY;
  const g0=-Math.ceil(range/GRID_STEP)*GRID_STEP; // snap to GRID_STEP multiples
  const g1= Math.ceil(range/GRID_STEP)*GRID_STEP;
  oCtx.beginPath();
  for(let gx=g0;gx<=g1;gx+=GRID_STEP){
    for(let gz=g0;gz<=g1;gz+=GRID_STEP){
      const pCx=cx+panX+gx*sc, pCy=cy+panY+gz*sc;
      const aC=proj3d(gx,GRID_Y,gz);
      const sx=pCx+(aC.x-pCx)*viewT, sy=pCy+(aC.y-pCy)*viewT;
      if(sx<-20||sx>W+20||sy<-20||sy>H+20)continue;
      const pLx=cx+panX+(gx-arm)*sc, pRx=cx+panX+(gx+arm)*sc;
      const aL=proj3d(gx-arm,GRID_Y,gz), aR=proj3d(gx+arm,GRID_Y,gz);
      const lx=pLx+(aL.x-pLx)*viewT, ly=pCy+(aL.y-pCy)*viewT;
      const rx=pRx+(aR.x-pRx)*viewT, ry=pCy+(aR.y-pCy)*viewT;
      oCtx.moveTo(lx,ly);oCtx.lineTo(rx,ry);
      const pTy=cy+panY+(gz-arm)*sc, pBy=cy+panY+(gz+arm)*sc;
      const aT=proj3d(gx,GRID_Y,gz-arm), aB=proj3d(gx,GRID_Y,gz+arm);
      const tx=pCx+(aT.x-pCx)*viewT, ty_=pTy+(aT.y-pTy)*viewT;
      const bx=pCx+(aB.x-pCx)*viewT, by=pBy+(aB.y-pBy)*viewT;
      oCtx.moveTo(tx,ty_);oCtx.lineTo(bx,by);
    }
  }
  oCtx.stroke();
}

// ── Scale bar — centred above title, rotates with grid ──
const SCALE_STEPS=[10,25,50,100,200,500];
const titleEl=document.querySelector('.title-main');
function drawScaleBar(){
  const sc=planSc();
  // Anchor: centred above title
  const tRect=titleEl.getBoundingClientRect();
  const anchorCX=tRect.left+tRect.width/2;
  const anchorY=tRect.top-80;
  // Measure projected length of 1 model unit along X at origin
  const pA0=cx+planPanX, pB0=cx+planPanX+sc;
  const aA0=proj3d(0,GRID_Y,0), aB0=proj3d(1,GRID_Y,0);
  const ux=(pA0+(aA0.x-pA0)*viewT), uy=(cy+planPanY+(aA0.y-cy)*viewT);
  const vx=(pB0+(aB0.x-pB0)*viewT), vy=(cy+planPanY+(aB0.y-cy)*viewT);
  const pxPerModel=Math.sqrt((vx-ux)*(vx-ux)+(vy-uy)*(vy-uy));
  const pxPerFt=pxPerModel/443;
  // Pick best step
  let bestFt=SCALE_STEPS[0];
  for(let i=SCALE_STEPS.length-1;i>=0;i--){
    if(SCALE_STEPS[i]*pxPerFt<=120&&SCALE_STEPS[i]*pxPerFt>=30){bestFt=SCALE_STEPS[i];break;}
    if(SCALE_STEPS[i]*pxPerFt<30)break;
    bestFt=SCALE_STEPS[i];
  }
  const barModel=bestFt/443;
  const ref=0;
  const pPlanAx=cx+planPanX+(ref-barModel/2)*sc, pPlanBx=cx+planPanX+(ref+barModel/2)*sc;
  const pPlanY=cy+planPanY+ref*sc;
  const aA=proj3d(ref-barModel/2,GRID_Y,ref), aB=proj3d(ref+barModel/2,GRID_Y,ref);
  const ax_=pPlanAx+(aA.x-pPlanAx)*viewT, ay_=pPlanY+(aA.y-pPlanY)*viewT;
  const bx_=pPlanBx+(aB.x-pPlanBx)*viewT, by_=pPlanY+(aB.y-pPlanY)*viewT;
  let dx=bx_-ax_, dy=by_-ay_;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return;
  dx/=len;dy/=len;
  const barPx=bestFt*pxPerFt;
  // Centre the bar on anchorCX
  const x0=anchorCX-barPx*dx/2, y0=anchorY-barPx*dy/2;
  const x1=anchorCX+barPx*dx/2, y1=anchorY+barPx*dy/2;
  oCtx.strokeStyle='rgba(255,255,255,0.18)';
  oCtx.lineWidth=0.5;
  oCtx.beginPath();
  oCtx.moveTo(x0,y0);oCtx.lineTo(x1,y1);
  const tk=4;
  oCtx.moveTo(x0-dy*tk,y0+dx*tk);oCtx.lineTo(x0+dy*tk,y0-dx*tk);
  oCtx.moveTo(x1-dy*tk,y1+dx*tk);oCtx.lineTo(x1+dy*tk,y1-dx*tk);
  oCtx.stroke();
  oCtx.save();
  const midX=(x0+x1)/2, midY=(y0+y1)/2;
  const angle=Math.atan2(dy,dx);
  oCtx.translate(midX,midY);
  const rot=(angle>Math.PI/2||angle<-Math.PI/2)?angle+Math.PI:angle;
  oCtx.rotate(rot);
  oCtx.fillStyle='rgba(255,255,255,0.18)';
  oCtx.font='10px "Cascadia Mono",monospace';
  oCtx.letterSpacing='0.18em';
  oCtx.textAlign='center';oCtx.textBaseline='bottom';
  oCtx.fillText(bestFt+' FT',0,-5);
  oCtx.restore();
}

const _resOrig=resize;resize=function(){_resOrig();buildGrain();};

let frameCount=0;
function animate(){
  time+=0.016;frameCount++;

  // Smooth view transition
  viewT+=(viewTarget-viewT)*0.045;
  if(Math.abs(viewT-viewTarget)<0.001)viewT=viewTarget;

  updateHover();

  let anyActive=false;
  for(let i=0;i<ZONE_COUNT;i++)if(zoneAct[i]>0.05){anyActive=true;break;}
  const fadeAlpha=(anyActive||axoHoverActive)?0.12:0.18;
  ctx.fillStyle='rgba(8,9,11,'+fadeAlpha+')';
  ctx.fillRect(0,0,W,H);
  if(frameCount%120===0){ctx.fillStyle='rgba(8,9,11,0.5)';ctx.fillRect(0,0,W,H);}

  // Grain shimmer — refresh every ~8 frames
  grainTimer++;
  if(grainTimer%8===0)buildGrain();
  ctx.drawImage(grainCanvas,0,0,W,H);

  // Particles (on trail canvas)
  tick();

  // Overlay: fully cleared each frame — grid, massing, nodes, scale bar stay crisp
  oCtx.clearRect(0,0,W,H);
  drawDotGrid();
  if(viewT<0.98){oCtx.globalAlpha=1-viewT;drawMassingOutline();oCtx.globalAlpha=1;}
  if(viewT<0.98&&!panelOpen){oCtx.globalAlpha=1-viewT;drawNodes();oCtx.globalAlpha=1;}
  drawScaleBar();
  requestAnimationFrame(animate);
}
ctx.fillStyle='#08090b';ctx.fillRect(0,0,W,H);
animate();

function switchView(v){
  if(v===currentView)return;
  currentView=v;
  viewTarget=v==='axo'?1:0;
  document.getElementById('btn-plan').classList.toggle('active',v==='plan');
  document.getElementById('btn-axo').classList.toggle('active',v==='axo');
  document.getElementById('hint-plan').style.opacity=v==='plan'?'1':'0';
  document.getElementById('hint-axo').style.opacity=v==='axo'?'1':'0';
  document.getElementById('layer-toggles').classList.toggle('visible',v==='axo');
  document.getElementById('prog-toggles').classList.toggle('visible',v==='plan');
  if(panelOpen)closePanel();
}
function selectProg(idx){
  if(panelOpen&&selectedZone===idx){closePanel();return;}
  if(panelOpen){switchPanel(idx);}else{openPanel(idx);}
}
function updateProgBtns(){
  const btns=document.querySelectorAll('.prog-btn');
  btns.forEach(function(btn){
    const zi=parseInt(btn.getAttribute('data-zi'));
    btn.classList.toggle('active',selectedZone===zi);
  });
}
function toggleLayer(btn,idx){layerVis[idx]=!layerVis[idx];btn.classList.toggle('active');ctx.fillStyle='#08090b';ctx.fillRect(0,0,W,H);}

canvas.addEventListener('click',function(e){
  if(viewT>0.1||dragMoved)return;
  if(hoveredZone>=0){
    if(panelOpen&&hoveredZone===selectedZone){
      closePanel();
    }else if(panelOpen&&hoveredZone!==selectedZone){
      switchPanel(hoveredZone);
    }else if(!panelOpen){
      openPanel(hoveredZone);
    }
    return;
  }
  // Click outside any zone while panel open = close
  if(panelOpen)closePanel();
});

function openPanel(idx){
  selectedZone=idx;panelOpen=true;hlFade=0;
  hoverLabel.style.opacity='0';
  fillPanelContent(idx);
  document.getElementById('detail-left').classList.add('open');
  const z=ZONES[idx];
  bgOverlay.style.background=z.bg;bgTarget=1;bgCurrentZone=idx;
  updateProgBtns();
}

function switchPanel(idx){
  // Fade out current content, then fade in new
  const leftEl=document.getElementById('detail-left');
  leftEl.style.opacity='0';
  selectedZone=idx;hlFade=0;
  const z=ZONES[idx];
  bgOverlay.style.background=z.bg;bgTarget=1;bgCurrentZone=idx;
  updateProgBtns();
  setTimeout(function(){
    fillPanelContent(idx);
    leftEl.style.opacity='';
    leftEl.classList.add('open');
  },400);
}

function fillPanelContent(idx){
  const z=ZONES[idx];
  document.getElementById('pz-num').textContent='ZONE '+String(z.id).padStart(2,'0')+' OF '+ZONE_COUNT+'';
  document.getElementById('pz-name').textContent=z.name;
  const sub=document.getElementById('pz-sub');sub.textContent=z.sub;sub.style.color=z.color;
  document.getElementById('pz-desc').textContent=z.desc;
  let mh='';
  z.mechanics.forEach(function(m){mh+='<div class="mechanic-item"><div class="mechanic-title">'+m.t+'</div><div class="mechanic-desc">'+m.d+'</div></div>';});
  document.getElementById('pz-mechanics').innerHTML=mh;
}

function closePanel(){
  panelOpen=false;selectedZone=-1;
  document.getElementById('detail-left').classList.remove('open');
  ctx.fillStyle='#08090b';ctx.fillRect(0,0,W,H);
  bgTarget=0;
  updateProgBtns();
}

let dSPX,dSPY,dragMoved=false;
canvas.addEventListener('mousedown',function(e){
  isDrag=true;dragMoved=false;dSX=e.clientX;dSY=e.clientY;
  if(viewT>0.9){dSRX=axoRotX;dSRY=axoRotY;}
  else{dSPX=planPanX;dSPY=planPanY;}
});
addEventListener('mousemove',function(e){if(!isDrag)return;
  const dx=e.clientX-dSX,dy=e.clientY-dSY;
  if(!dragMoved&&Math.abs(dx)<4&&Math.abs(dy)<4)return;
  dragMoved=true;
  if(viewT>0.9){axoRotY=dSRY+dx*.005;axoRotX=Math.max(-1,Math.min(1.2,dSRX+dy*.005));}
  else if(viewT<0.1){planPanX=dSPX+dx;planPanY=dSPY+dy;}
});
addEventListener('mouseup',function(){isDrag=false});
canvas.addEventListener('wheel',function(e){e.preventDefault();if(viewT>0.9){axoZoom=Math.max(.4,Math.min(3,axoZoom+e.deltaY*-.001));}else if(viewT<0.1){planZoom=Math.max(.5,Math.min(3,planZoom+e.deltaY*-.001));}},{passive:false});
canvas.addEventListener('touchstart',function(e){if(e.touches.length!==1)return;isDrag=true;dSX=e.touches[0].clientX;dSY=e.touches[0].clientY;
  if(viewT>0.9){dSRX=axoRotX;dSRY=axoRotY;}else{dSPX=planPanX;dSPY=planPanY;}},{passive:true});
canvas.addEventListener('touchmove',function(e){if(!isDrag||e.touches.length!==1)return;
  if(viewT>0.9){axoRotY=dSRY+(e.touches[0].clientX-dSX)*.005;axoRotX=Math.max(-1,Math.min(1.2,dSRX+(e.touches[0].clientY-dSY)*.005));}
  else if(viewT<0.1){planPanX=dSPX+(e.touches[0].clientX-dSX);planPanY=dSPY+(e.touches[0].clientY-dSY);}},{passive:true});
canvas.addEventListener('touchend',function(){isDrag=false},{passive:true});
</script>
